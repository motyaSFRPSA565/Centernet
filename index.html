<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTERNET — Браузер Сан-Фиерро</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
        }

        body {
            background: #f0f4fa;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* СВЕТЛАЯ ТЕМА (по умолчанию) */
        :root {
            --bg-primary: #f0f4fa;
            --bg-secondary: #ffffff;
            --bg-panel: #e8edf5;
            --text-primary: #1a2a3f;
            --text-secondary: #4a627a;
            --border: #cbd5e1;
            --accent: #2a5f8a;
            --accent-hover: #1e4a6e;
            --accent-light: #e6f0f9;
        }

        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-panel: #0a0f1a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-light: #1e293b;
        }

        .browser {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-primary);
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .browser-toolbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .tab-bar {
            display: flex;
            gap: 2px;
            overflow-x: auto;
            flex: 1;
        }

        .tab {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 8px 16px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            border-radius: 8px 8px 0 0;
        }

        .tab.active {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
            font-weight: 500;
        }

        .tab-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            width: 20px;
            border-radius: 4px;
        }

        .tab-close:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .new-tab {
            background: var(--accent-light);
            border: 1px solid var(--border);
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-primary);
            border-radius: 8px;
            font-size: 12px;
        }

        .url-bar {
            flex: 2;
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 6px 12px;
        }

        .url-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            padding: 6px 0;
        }

        .go-btn {
            background: var(--accent);
            border: none;
            padding: 6px 16px;
            color: white;
            cursor: pointer;
            border-radius: 20px;
            font-weight: 500;
        }

        .go-btn:hover {
            background: var(--accent-hover);
        }

        .user-menu {
            display: flex;
            gap: 10px;
            align-items: center;
            background: var(--accent-light);
            padding: 6px 12px;
            border-radius: 24px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .theme-toggle {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 16px;
        }

        /* СТРАНИЦЫ */
        .pages-container {
            flex: 1;
            position: relative;
            background: var(--bg-primary);
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .page.active {
            display: block;
        }

        .iframe-page {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .sar-page {
            padding: 30px;
            overflow-y: auto;
            height: 100%;
            color: var(--text-primary);
        }

        /* АВТОРИЗАЦИЯ */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .auth-box {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
        }

        .auth-logo {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .auth-title {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 25px;
            font-weight: 500;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 15px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--accent);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
            margin-top: 5px;
        }

        .auth-btn:hover {
            background: var(--accent-hover);
        }

        .auth-switch {
            margin-top: 18px;
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
        }

        .demo-users {
            margin-top: 20px;
            padding: 12px;
            background: var(--accent-light);
            border-radius: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        /* КАРТОЧКИ .SAR */
        .sar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .sar-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sar-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            border-color: var(--accent);
        }

        .sar-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .sar-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .sar-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* ПОГОДА */
        .weather-card {
            background: var(--bg-secondary);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .weather-temp {
            font-size: 64px;
            font-weight: 300;
            color: var(--accent);
        }
    </style>
</head>
<body>
<div class="auth-screen" id="authScreen">
    <div class="auth-box">
        <div class="auth-logo">🌐</div>
        <div class="auth-title" id="authTitle">Вход в Centernet</div>
        <input type="text" class="auth-input" id="authLogin" placeholder="Имя пользователя">
        <input type="text" class="auth-input" id="authTag" placeholder="@centa.com">
        <input type="password" class="auth-input" id="authPassword" placeholder="Пароль">
        <button class="auth-btn" id="authBtn">Войти</button>
        <div class="auth-switch" id="authSwitch">Нет аккаунта? Зарегистрироваться</div>
        <div class="demo-users">
            📢 Демо-аккаунты:<br>
            motya@centa.com / 123<br>
            drago@centa.com / 123<br>
            timur@centa.com / 123
        </div>
    </div>
</div>

<div class="browser" id="browser" style="display: none;">
    <div class="browser-toolbar">
        <div class="tab-bar" id="tabBar">
            <div class="tab active" data-tab="0">
                <span>🏠</span>
                <span>Centernet</span>
                <button class="tab-close">✕</button>
            </div>
        </div>
        <button class="new-tab" id="newTabBtn">+ Новая вкладка</button>
        <div class="url-bar">
            <span>🔍</span>
            <input type="text" class="url-input" id="urlInput" placeholder="Введите URL или поисковый запрос...">
            <button class="go-btn" id="goBtn">Перейти</button>
        </div>
        <button class="theme-toggle" id="themeToggle" title="Сменить тему">🌙</button>
        <div class="user-menu" id="userMenu">
            <span id="userAvatar">👤</span>
            <span id="userEmail" style="font-size: 13px;">user@centa.com</span>
        </div>
    </div>
    <div class="pages-container" id="pagesContainer">
        <div class="page active" data-page="0">
            <div class="sar-page" id="homePage">
                <!-- загрузится через JS -->
            </div>
        </div>
    </div>
</div>

<script>
    // ===== ПЕРЕМЕННЫЕ =====
    let allUsers = JSON.parse(localStorage.getItem('centernet_users')) || {};
    let currentUser = null;
    let tabs = [{ id: 0, url: 'centernet', title: 'Centernet' }];
    let activeTab = 0;
    let nextTabId = 1;
    let isDark = localStorage.getItem('centernet_theme') === 'dark';

    // ===== ТЕМА =====
    function setTheme(dark) {
        if (dark) {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').innerHTML = '☀️';
        } else {
            document.body.classList.remove('dark');
            document.getElementById('themeToggle').innerHTML = '🌙';
        }
        localStorage.setItem('centernet_theme', dark ? 'dark' : 'light');
        isDark = dark;
    }

    document.getElementById('themeToggle').onclick = () => setTheme(!isDark);
    if (isDark) setTheme(true);

    // ===== АККАУНТЫ =====
    function register(email, password) {
        if (allUsers[email]) return false;
        const username = email.split('@')[0];
        allUsers[email] = {
            username: username,
            email: email,
            password: password,
            avatar: '👤',
            bookmarks: []
        };
        localStorage.setItem('centernet_users', JSON.stringify(allUsers));
        return true;
    }

    function login(email, password) {
        if (allUsers[email] && allUsers[email].password === password) {
            currentUser = email;
            localStorage.setItem('centernet_current', currentUser);
            return true;
        }
        return false;
    }

    // ===== СТРАНИЦЫ =====
    function getHomePage() {
        return `
            <div style="max-width: 800px; margin: 0 auto;">
                <div style="text-align: center; margin-bottom: 40px;">
                    <div style="font-size: 64px; margin-bottom: 16px;">🌐</div>
                    <h1 style="color: var(--text-primary); margin-bottom: 8px;">Centernet</h1>
                    <p style="color: var(--text-secondary);">Поиск в интернете и .sar сайты</p>
                </div>
                <div style="display: flex; gap: 12px; margin-bottom: 40px;">
                    <input type="text" id="homeSearch" style="flex:1; padding: 14px 20px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 40px; color: var(--text-primary); font-size: 16px;" placeholder="Поиск в Google или .sar сайт">
                    <button onclick="searchFromHome()" style="background: var(--accent); border: none; padding: 14px 28px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer;">🔍</button>
                </div>
                <div class="sar-grid">
                    <div class="sar-card" onclick="openSarSite('sinopt')">
                        <div class="sar-icon">☁️</div>
                        <div class="sar-title">Sinopt.sar</div>
                        <div class="sar-desc">Погода в Сан-Фиерро</div>
                    </div>
                    <div class="sar-card" onclick="openSarSite('fbi')">
                        <div class="sar-icon">🏛️</div>
                        <div class="sar-title">FBI.sar</div>
                        <div class="sar-desc">ФБР Сан-Андреас</div>
                    </div>
                    <div class="sar-card" onclick="openSarSite('gensec')">
                        <div class="sar-icon">🛡️</div>
                        <div class="sar-title">GENSEC.sar</div>
                        <div class="sar-desc">Частная охрана</div>
                    </div>
                    <div class="sar-card" onclick="openSarSite('bmz')">
                        <div class="sar-icon">⚡</div>
                        <div class="sar-title">BMZ.sar</div>
                        <div class="sar-desc">Элитное подразделение</div>
                    </div>
                </div>
            </div>
        `;
    }

    function getSinoptPage() {
        return `
            <div style="max-width: 500px; margin: 0 auto;">
                <div class="weather-card">
                    <div style="font-size: 48px; margin-bottom: 16px;">☁️</div>
                    <h2 style="color: var(--text-primary); margin-bottom: 8px;">Sinopt.sar</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">Погода в Сан-Фиерро</p>
                    <div id="weatherTemp" class="weather-temp">--°C</div>
                    <div id="weatherDesc" style="color: var(--text-secondary); margin-top: 12px;">Загрузка...</div>
                    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary);">
                        🌍 Данные: Сан-Фиерро (реальная погода)
                    </div>
                </div>
            </div>
            <script>
                fetch('https://api.open-meteo.com/v1/forecast?latitude=37.77&longitude=-122.42&current_weather=true')
                    .then(r => r.json())
                    .then(d => {
                        document.getElementById('weatherTemp').innerHTML = d.current_weather.temperature + '°C';
                        document.getElementById('weatherDesc').innerHTML = '💨 Ветер: ' + d.current_weather.windspeed + ' м/с';
                    })
                    .catch(() => {
                        document.getElementById('weatherDesc').innerHTML = '🌤️ +18°C, легкий ветер';
                    });
            <\/script>
        `;
    }

    function getFBIPage() {
        return `
            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--text-primary); margin-bottom: 24px;">🏛️ FBI.sar</h1>
                <div style="background: var(--bg-secondary); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">ФБР округа Сан-Андреас</h3>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Директор: <strong>Майк Малас</strong></p>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Горячая линия: <strong>+1 (555) FBI-HELP</strong></p>
                    <p style="color: var(--text-primary);">Email: <strong>info@fbi.sanandreas.gov</strong></p>
                </div>
                <div style="background: var(--bg-secondary); border-radius: 16px; padding: 24px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">Последние новости</h3>
                    <p style="color: var(--text-primary); margin-bottom: 12px;">🔹 21.03.2026 — Задержаны подозреваемые в ограблении банка</p>
                    <p style="color: var(--text-primary); margin-bottom: 12px;">🔹 20.03.2026 — Пресечена попытка взлома GENSEC</p>
                    <p style="color: var(--text-primary);">🔹 19.03.2026 — Драго всё ещё должен 100 рублей</p>
                </div>
            </div>
        `;
    }

    function getGENSECPage() {
        return `
            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--text-primary); margin-bottom: 24px;">🛡️ GENSEC.sar</h1>
                <div style="background: var(--bg-secondary); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">Частная охранная компания</h3>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Основатель: <strong>Майк Малас</strong></p>
                    <p style="color: var(--text-primary);">Специализация: охрана банков, кибербезопасность, SWAT-поддержка</p>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                    <div style="background: var(--bg-secondary); border-radius: 16px; padding: 20px; text-align: center; border: 1px solid var(--border);">
                        <div style="font-size: 28px; margin-bottom: 8px;">🛡️</div>
                        <div style="font-weight: 600;">Базовый</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">1000$/мес</div>
                    </div>
                    <div style="background: var(--bg-secondary); border-radius: 16px; padding: 20px; text-align: center; border: 1px solid var(--border);">
                        <div style="font-size: 28px; margin-bottom: 8px;">⚔️</div>
                        <div style="font-weight: 600;">Плюс</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">5000$/мес</div>
                    </div>
                    <div style="background: var(--bg-secondary); border-radius: 16px; padding: 20px; text-align: center; border: 1px solid var(--border);">
                        <div style="font-size: 28px; margin-bottom: 8px;">🏆</div>
                        <div style="font-weight: 600;">Премиум</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">25000$/мес</div>
                    </div>
                </div>
            </div>
        `;
    }

    function getBMZPage() {
        return `
            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--text-primary); margin-bottom: 24px;">⚡ BMZ.sar</h1>
                <div style="background: var(--bg-secondary); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">Blackmurk Zealwater</h3>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Элитное подразделение специального назначения</p>
                    <p style="color: var(--text-primary);">Антитеррор • Контрштурм • Защита VIP</p>
                </div>
                <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                    <span style="background: var(--bg-secondary); padding: 8px 16px; border-radius: 40px; border: 1px solid var(--border);">⚡ Клокеры</span>
                    <span style="background: var(--bg-secondary); padding: 8px 16px; border-radius: 40px; border: 1px solid var(--border);">🫎 Бульдозеры</span>
                    <span style="background: var(--bg-secondary); padding: 8px 16px; border-radius: 40px; border: 1px solid var(--border);">🛡️ Щитоносцы</span>
                    <span style="background: var(--bg-secondary); padding: 8px 16px; border-radius: 40px; border: 1px solid var(--border);">🐻 Медведи-медики</span>
                </div>
            </div>
        `;
    }

    function renderPage(tabId, url) {
        const pageDiv = document.querySelector(`.page[data-page="${tabId}"]`);
        if (!pageDiv) return;

        let content = '';
        if (url === 'centernet') content = getHomePage();
        else if (url === 'sinopt') content = getSinoptPage();
        else if (url === 'fbi') content = getFBIPage();
        else if (url === 'gensec') content = getGENSECPage();
        else if (url === 'bmz') content = getBMZPage();
        else if (url.includes('http')) {
            pageDiv.innerHTML = `<iframe class="iframe-page" src="${url}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>`;
            return;
        } else {
            content = `<div style="text-align:center; padding:50px;"><h2>❌ Сайт не найден</h2><p>Проверьте правильность адреса</p></div>`;
        }
        
        pageDiv.innerHTML = `<div class="sar-page">${content}</div>`;
        
        // Привязываем поиск после рендера
        if (url === 'centernet') {
            setTimeout(() => {
                const searchInput = document.getElementById('homeSearch');
                if (searchInput) {
                    searchInput.onkeypress = (e) => { if (e.key === 'Enter') searchFromHome(); };
                }
            }, 50);
        }
    }

    function navigateTo(query) {
        if (!query.trim()) return;
        
        const lower = query.toLowerCase();
        const sarSites = ['sinopt', 'fbi', 'gensec', 'bmz', 'centernet'];
        
        if (sarSites.includes(lower)) {
            const tab = tabs.find(t => t.id === activeTab);
            if (tab) tab.url = lower;
            renderPage(activeTab, lower);
            document.getElementById('urlInput').value = lower;
        } else if (lower.includes('.') || lower.includes('http')) {
            let url = lower;
            if (!url.startsWith('http')) url = 'https://' + url;
            const tab = tabs.find(t => t.id === activeTab);
            if (tab) tab.url = url;
            renderPage(activeTab, url);
            document.getElementById('urlInput').value = url;
        } else {
            const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            const tab = tabs.find(t => t.id === activeTab);
            if (tab) tab.url = searchUrl;
            renderPage(activeTab, searchUrl);
            document.getElementById('urlInput').value = searchUrl;
        }
    }

    window.openSarSite = function(site) {
        const tab = tabs.find(t => t.id === activeTab);
        if (tab) tab.url = site;
        renderPage(activeTab, site);
        document.getElementById('urlInput').value = site;
    };

    window.searchFromHome = function() {
        const input = document.getElementById('homeSearch');
        if (input) navigateTo(input.value);
    };

    // ===== ВКЛАДКИ =====
    function createNewTab() {
        const newId = nextTabId++;
        tabs.push({ id: newId, url: 'centernet', title: 'Centernet' });
        
        const tabBar = document.getElementById('tabBar');
        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab';
        tabDiv.setAttribute('data-tab', newId);
        tabDiv.innerHTML = `<span>🏠</span><span>Centernet</span><button class="tab-close">✕</button>`;
        tabDiv.onclick = (e) => {
            if (e.target.classList.contains('tab-close')) {
                closeTab(newId);
                e.stopPropagation();
                return;
            }
            switchTab(newId);
        };
        tabBar.appendChild(tabDiv);
        
        const pagesContainer = document.getElementById('pagesContainer');
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        pageDiv.setAttribute('data-page', newId);
        pageDiv.innerHTML = `<div class="sar-page">${getHomePage()}</div>`;
        pagesContainer.appendChild(pageDiv);
        
        switchTab(newId);
    }

    function closeTab(tabId) {
        if (tabs.length === 1) {
            createNewTab();
            setTimeout(() => closeTab(tabId), 10);
            return;
        }
        
        const index = tabs.findIndex(t => t.id === tabId);
        if (index === -1) return;
        tabs.splice(index, 1);
        
        const tabDiv = document.querySelector(`.tab[data-tab="${tabId}"]`);
        if (tabDiv) tabDiv.remove();
        const pageDiv = document.querySelector(`.page[data-page="${tabId}"]`);
        if (pageDiv) pageDiv.remove();
        
        if (activeTab === tabId) {
            const newActive = tabs[0]?.id;
            if (newActive) switchTab(newActive);
        }
    }

    function switchTab(tabId) {
        activeTab = tabId;
        document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelector(`.page[data-page="${tabId}"]`).classList.add('active');
        
        const tab = tabs.find(t => t.id === tabId);
        if (tab) {
            document.getElementById('urlInput').value = tab.url;
        }
    }

    // ===== АВТОРИЗАЦИЯ =====
    document.getElementById('authBtn').onclick = () => {
        const login = document.getElementById('authLogin').value.trim();
        const tag = document.getElementById('authTag').value.trim();
        const password = document.getElementById('authPassword').value;
        const email = login + tag;
        const isLogin = document.getElementById('authTitle').innerText === 'Вход в Centernet';
        
        if (isLogin) {
            if (login(email, password)) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('browser').style.display = 'flex';
                document.getElementById('userEmail').innerText = email;
                document.getElementById('userAvatar').innerHTML = allUsers[email]?.avatar || '👤';
                renderPage(0, 'centernet');
            } else alert('Неверные данные');
        } else {
            if (register(email, password)) {
                alert('Регистрация успешна! Войдите.');
                document.getElementById('authTitle').innerText = 'Вход в Centernet';
                document.getElementById('authBtn').innerText = 'Войти';
                document.getElementById('authSwitch').innerHTML = 'Нет аккаунта? Зарегистрироваться';
            } else alert('Пользователь уже существует');
        }
    };

    document.getElementById('authSwitch').onclick = () => {
        const isLogin = document.getElementById('authTitle').innerText === 'Вход в Centernet';
        if (isLogin) {
            document.getElementById('authTitle').innerText = 'Регистрация';
            document.getElementById('authBtn').innerText = 'Зарегистрироваться';
            document.getElementById('authSwitch').innerHTML = 'Уже есть аккаунт? Войти';
        } else {
            document.getElementById('authTitle').innerText = 'Вход в Centernet';
            document.getElementById('authBtn').innerText = 'Войти';
            document.getElementById('authSwitch').innerHTML = 'Нет аккаунта? Зарегистрироваться';
        }
    };

    document.getElementById('goBtn').onclick = () => {
        const url = document.getElementById('urlInput').value;
        navigateTo(url);
    };

    document.getElementById('urlInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('goBtn').click();
    });

    document.getElementById('newTabBtn').onclick = () => createNewTab();

    const saved = localStorage.getItem('centernet_current');
    if (saved && allUsers[saved]) {
        currentUser = saved;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('browser').style.display = 'flex';
        document.getElementById('userEmail').innerText = saved;
        document.getElementById('userAvatar').innerHTML = allUsers[saved]?.avatar || '👤';
        renderPage(0, 'centernet');
    }
</script>
</body>
</html>
