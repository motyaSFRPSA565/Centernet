<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CENTERNET — Браузер Сан-Фиерро</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f0f4fa;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* СВЕТЛАЯ ТЕМА (по умолчанию) */
        :root {
            --bg-primary: #f0f4fa;
            --bg-secondary: #ffffff;
            --bg-panel: #e8edf5;
            --text-primary: #1a2a3f;
            --text-secondary: #4a627a;
            --border: #cbd5e1;
            --accent: #2a5f8a;
            --accent-hover: #1e4a6e;
            --accent-light: #e6f0f9;
        }

        body.dark {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-panel: #0a0f1a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #334155;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-light: #1e293b;
        }

        .browser {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--bg-primary);
        }

        .toolbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 8px 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .tabs {
            display: flex;
            gap: 4px;
            overflow-x: auto;
            flex: 1;
        }

        .tab {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-bottom: none;
            padding: 8px 20px;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            border-radius: 12px 12px 0 0;
        }

        .tab.active {
            background: var(--bg-secondary);
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
            font-weight: 500;
        }

        .tab-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 16px;
            width: 22px;
            border-radius: 6px;
        }

        .tab-close:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .new-tab {
            background: var(--accent-light);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
        }

        .url-bar {
            flex: 2;
            display: flex;
            gap: 8px;
            align-items: center;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 16px;
            position: relative;
        }

        .url-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            padding: 8px 0;
        }

        .go-btn {
            background: var(--accent);
            border: none;
            padding: 6px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--accent-light);
            padding: 5px 12px;
            border-radius: 30px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .theme-toggle, .bookmark-btn {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 16px;
        }

        .pages-container {
            flex: 1;
            position: relative;
            background: var(--bg-primary);
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        .page.active {
            display: block;
        }

        .iframe-page {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .sar-page {
            padding: 30px;
            overflow-y: auto;
            height: 100%;
            color: var(--text-primary);
        }

        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 3000;
        }

        .auth-box {
            background: var(--bg-secondary);
            border-radius: 28px;
            padding: 40px;
            width: 380px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            border: 1px solid var(--border);
        }

        .auth-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .auth-title {
            font-size: 24px;
            color: var(--text-primary);
            margin-bottom: 28px;
            font-weight: 500;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 16px;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 24px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
        }

        .auth-input:focus {
            border-color: var(--accent);
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            font-size: 16px;
            margin-top: 8px;
        }

        .auth-switch {
            margin-top: 20px;
            color: var(--accent);
            font-size: 13px;
            cursor: pointer;
        }

        .demo-users {
            margin-top: 24px;
            padding: 12px;
            background: var(--accent-light);
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        #bookmarksPanel {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 320px;
            max-height: 400px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            z-index: 2000;
            overflow-y: auto;
            display: none;
        }

        .bookmark-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        .bookmark-item:hover {
            background: var(--accent-light);
        }
        .bookmark-icon {
            font-size: 20px;
            color: var(--accent);
        }
        .bookmark-info {
            flex: 1;
            cursor: pointer;
            overflow: hidden;
        }
        .bookmark-title {
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bookmark-url {
            font-size: 11px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .bookmark-delete {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 16px;
            padding: 4px 8px;
        }
        .bookmark-delete:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
<div class="auth-screen" id="authScreen">
    <div class="auth-box">
        <div class="auth-logo">🌐</div>
        <div class="auth-title" id="authTitle">Вход в Centernet</div>
        <input type="text" class="auth-input" id="authLogin" placeholder="Имя пользователя">
        <input type="text" class="auth-input" id="authTag" placeholder="@centa.com">
        <input type="password" class="auth-input" id="authPassword" placeholder="Пароль">
        <button class="auth-btn" id="authBtn">Войти</button>
        <div class="auth-switch" id="authSwitch">Нет аккаунта? Зарегистрироваться</div>
        <div class="demo-users">
            📢 Демо-аккаунты:<br>
            motya@centa.com / 123<br>
            drago@centa.com / 123<br>
            timur@centa.com / 123
        </div>
    </div>
</div>

<div class="browser" id="browser" style="display: none;">
    <div class="toolbar">
        <div class="tabs" id="tabBar">
            <div class="tab active" data-tab="0">
                <span>🏠</span>
                <span>Centernet</span>
                <button class="tab-close">✕</button>
            </div>
        </div>
        <button class="new-tab" id="newTabBtn">+ Новая вкладка</button>
        <div class="url-bar">
            <span>🔍</span>
            <input type="text" class="url-input" id="urlInput" placeholder="Введите URL или поисковый запрос...">
            <button class="go-btn" id="goBtn">Перейти</button>
        </div>
        <button class="bookmark-btn" id="bookmarkBtn" title="Добавить в закладки">🔖</button>
        <button class="bookmark-btn" id="bookmarksListBtn" title="Мои закладки">📚</button>
        <button class="theme-toggle" id="themeToggle" title="Сменить тему">🌙</button>
        <div class="user-menu" id="userMenu">
            <span id="userAvatar">👤</span>
            <span id="userEmail" style="font-size: 13px;">user@centa.com</span>
        </div>
    </div>
    <div class="pages-container" id="pagesContainer">
        <div class="page active" data-page="0">
            <div class="sar-page" id="homePage"></div>
        </div>
    </div>
</div>

<div id="bookmarksPanel">
    <div style="padding: 16px; border-bottom: 1px solid var(--border); font-weight: 600; display: flex; justify-content: space-between; align-items: center;">
        <span>🔖 Закладки</span>
        <button id="closeBookmarksPanel" style="background:none; border:none; cursor:pointer; font-size:20px;">✕</button>
    </div>
    <div id="bookmarksList"></div>
</div>

<script>
    // ===== БАЗА ПОЛЬЗОВАТЕЛЕЙ =====
    let allUsers = JSON.parse(localStorage.getItem('centernet_users'));
    if (!allUsers || Object.keys(allUsers).length === 0) {
        allUsers = {
            'motya@centa.com': { username: 'motya', email: 'motya@centa.com', password: '123', avatar: '😎', bookmarks: [] },
            'drago@centa.com': { username: 'drago', email: 'drago@centa.com', password: '123', avatar: '🏃', bookmarks: [] },
            'timur@centa.com': { username: 'timur', email: 'timur@centa.com', password: '123', avatar: '🤐', bookmarks: [] }
        };
        localStorage.setItem('centernet_users', JSON.stringify(allUsers));
    }

    let currentUser = null;
    let tabs = [{ id: 0, url: 'centernet', title: 'Centernet', type: 'sar' }];
    let activeTab = 0;
    let nextTabId = 1;
    let isDark = localStorage.getItem('centernet_theme') === 'dark';
    let bookmarks = [];

    // ===== ТЕМА =====
    function setTheme(dark) {
        if (dark) {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').innerHTML = '☀️';
        } else {
            document.body.classList.remove('dark');
            document.getElementById('themeToggle').innerHTML = '🌙';
        }
        localStorage.setItem('centernet_theme', dark ? 'dark' : 'light');
        isDark = dark;
    }
    if (isDark) setTheme(true);
    document.getElementById('themeToggle').onclick = () => setTheme(!isDark);

    // ===== .SAR СТРАНИЦЫ =====
    function getHomePage() {
        return `
            <div style="max-width: 800px; margin: 0 auto;">
                <div style="text-align: center; margin-bottom: 40px;">
                    <div style="font-size: 64px; margin-bottom: 16px;">🌐</div>
                    <h1 style="color: var(--text-primary);">Centernet</h1>
                    <p style="color: var(--text-secondary);">Ваш браузер в Сан-Фиерро</p>
                </div>
                <div style="display: flex; gap: 12px; margin-bottom: 40px;">
                    <input type="text" id="homeSearch" style="flex:1; padding: 14px 20px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 40px; color: var(--text-primary); font-size: 16px;" placeholder="Поиск в Google или .sar сайт">
                    <button onclick="searchFromHome()" style="background: var(--accent); border: none; padding: 14px 28px; border-radius: 40px; color: white; font-weight: 500; cursor: pointer;">🔍</button>
                </div>
                <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;">
                    <div onclick="openSarSite('sinopt')" style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 24px; text-align: center; cursor: pointer;">☁️ SINOPT.SAR</div>
                    <div onclick="openSarSite('fbi')" style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 24px; text-align: center; cursor: pointer;">🏛️ FBI.SAR</div>
                    <div onclick="openSarSite('gensec')" style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 24px; text-align: center; cursor: pointer;">🛡️ GENSEC.SAR</div>
                    <div onclick="openSarSite('bmz')" style="background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 20px; padding: 24px; text-align: center; cursor: pointer;">⚡ BMZ.SAR</div>
                </div>
            </div>
        `;
    }

    function getSinoptPage() {
        return `
            <div style="max-width: 500px; margin: 0 auto;">
                <div style="background: var(--bg-secondary); border-radius: 28px; padding: 30px; text-align: center; border: 1px solid var(--border);">
                    <div style="font-size: 48px; margin-bottom: 16px;">☁️</div>
                    <h2 style="color: var(--text-primary); margin-bottom: 8px;">Sinopt.sar</h2>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">Погода в Сан-Фиерро</p>
                    <div id="weatherTemp" style="font-size: 56px; font-weight: 300; color: var(--accent);">--°C</div>
                    <div id="weatherDesc" style="color: var(--text-secondary); margin-top: 12px;">Загрузка...</div>
                    <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-secondary);">
                        🌍 Данные: реальная погода в Сан-Фиерро
                    </div>
                </div>
            </div>
            <script>
                fetch('https://api.open-meteo.com/v1/forecast?latitude=37.77&longitude=-122.42&current_weather=true')
                    .then(r => r.json())
                    .then(d => {
                        document.getElementById('weatherTemp').innerHTML = d.current_weather.temperature + '°C';
                        document.getElementById('weatherDesc').innerHTML = '💨 Ветер: ' + d.current_weather.windspeed + ' м/с';
                    })
                    .catch(() => {
                        document.getElementById('weatherDesc').innerHTML = '🌤️ +18°C, легкий ветер';
                    });
            <\/script>
        `;
    }

    function getFBIPage() {
        return `
            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--text-primary); margin-bottom: 24px;">🏛️ FBI.sar</h1>
                <div style="background: var(--bg-secondary); border-radius: 24px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">ФБР округа Сан-Андреас</h3>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Директор: <strong>Майк Малас</strong></p>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Горячая линия: <strong>+1 (555) FBI-HELP</strong></p>
                    <p style="color: var(--text-primary);">Email: <strong>info@fbi.sanandreas.gov</strong></p>
                </div>
                <div style="background: var(--bg-secondary); border-radius: 24px; padding: 24px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">Последние новости</h3>
                    <p style="color: var(--text-primary); margin-bottom: 12px;">🔹 28.03.2026 — Завершено расследование по делу о захвате школы</p>
                    <p style="color: var(--text-primary); margin-bottom: 12px;">🔹 27.03.2026 — Пресечена попытка взлома баз данных GENSEC</p>
                    <p style="color: var(--text-primary);">🔹 26.03.2026 — Драго всё ещё должен 100 рублей</p>
                </div>
            </div>
        `;
    }

    function getGENSECPage() {
        return `
            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--text-primary); margin-bottom: 24px;">🛡️ GENSEC.sar</h1>
                <div style="background: var(--bg-secondary); border-radius: 24px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">Частная охранная компания</h3>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Основатель: <strong>Майк Малас</strong></p>
                    <p style="color: var(--text-primary);">Специализация: охрана банков, кибербезопасность, SWAT-поддержка</p>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">
                    <div style="background: var(--bg-secondary); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--border);">
                        <div style="font-size: 28px; margin-bottom: 8px;">🛡️</div>
                        <div style="font-weight: 600;">Базовый</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">1000$/мес</div>
                    </div>
                    <div style="background: var(--bg-secondary); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--border);">
                        <div style="font-size: 28px; margin-bottom: 8px;">⚔️</div>
                        <div style="font-weight: 600;">Плюс</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">5000$/мес</div>
                    </div>
                    <div style="background: var(--bg-secondary); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid var(--border);">
                        <div style="font-size: 28px; margin-bottom: 8px;">🏆</div>
                        <div style="font-weight: 600;">Премиум</div>
                        <div style="font-size: 12px; color: var(--text-secondary);">25000$/мес</div>
                    </div>
                </div>
            </div>
        `;
    }

    function getBMZPage() {
        return `
            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--text-primary); margin-bottom: 24px;">⚡ BMZ.sar</h1>
                <div style="background: var(--bg-secondary); border-radius: 24px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">Blackmurk Zealwater</h3>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Элитное подразделение специального назначения</p>
                    <p style="color: var(--text-primary);">Антитеррор • Контрштурм • Защита VIP</p>
                </div>
                <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;">
                    <span style="background: var(--bg-secondary); padding: 8px 20px; border-radius: 40px; border: 1px solid var(--border);">⚡ Клокеры</span>
                    <span style="background: var(--bg-secondary); padding: 8px 20px; border-radius: 40px; border: 1px solid var(--border);">🫎 Бульдозеры</span>
                    <span style="background: var(--bg-secondary); padding: 8px 20px; border-radius: 40px; border: 1px solid var(--border);">🛡️ Щитоносцы</span>
                    <span style="background: var(--bg-secondary); padding: 8px 20px; border-radius: 40px; border: 1px solid var(--border);">🐻 Медведи-медики</span>
                </div>
            </div>
        `;
    }

    function getSarPageContent(site) {
        if (site === 'sinopt') return getSinoptPage();
        if (site === 'fbi') return getFBIPage();
        if (site === 'gensec') return getGENSECPage();
        if (site === 'bmz') return getBMZPage();
        return getHomePage();
    }

    // ===== ИСТОРИЯ =====
    function getHistory() {
        if (!currentUser) return [];
        return JSON.parse(localStorage.getItem(`centernet_history_${currentUser}`)) || [];
    }

    function saveToHistory(url) {
        if (!currentUser) return;
        let history = getHistory();
        history = [url, ...history.filter(u => u !== url)].slice(0, 50);
        localStorage.setItem(`centernet_history_${currentUser}`, JSON.stringify(history));
    }

    function showHistorySuggestions() {
        const history = getHistory();
        if (history.length === 0) return;
        
        const oldMenu = document.getElementById('historySuggestions');
        if (oldMenu) oldMenu.remove();
        
        const menu = document.createElement('div');
        menu.id = 'historySuggestions';
        menu.style.cssText = `
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-top: 4px;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-height: 300px;
            overflow-y: auto;
        `;
        
        history.slice(0, 8).forEach(url => {
            const item = document.createElement('div');
            item.style.cssText = `padding: 12px 16px; cursor: pointer; color: var(--text-primary); font-size: 13px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px;`;
            item.innerHTML = `<span style="color: var(--accent);">🕒</span><span style="flex:1; overflow:hidden; text-overflow:ellipsis;">${url}</span>`;
            item.onclick = () => { navigateTo(url); menu.remove(); };
            menu.appendChild(item);
        });
        
        const container = document.querySelector('.url-bar');
        container.appendChild(menu);
        setTimeout(() => {
            document.addEventListener('click', function closeMenu(e) {
                if (!menu.contains(e.target) && !document.getElementById('urlInput').contains(e.target)) {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                }
            });
        }, 100);
    }

    // ===== ЗАКЛАДКИ =====
    function loadBookmarks() {
        if (!currentUser) return;
        bookmarks = JSON.parse(localStorage.getItem(`centernet_bookmarks_${currentUser}`)) || [];
        updateBookmarksList();
    }

    function saveBookmarks() {
        if (!currentUser) return;
        localStorage.setItem(`centernet_bookmarks_${currentUser}`, JSON.stringify(bookmarks));
    }

    function addBookmark() {
        const url = document.getElementById('urlInput').value;
        if (!url) return;
        const title = url.length > 40 ? url.substring(0, 40) + '...' : url;
        if (bookmarks.some(b => b.url === url)) {
            showToast('❌ Уже в закладках');
            return;
        }
        bookmarks.unshift({ url, title, date: new Date().toLocaleString() });
        bookmarks = bookmarks.slice(0, 20);
        saveBookmarks();
        updateBookmarksList();
        showToast('🔖 Добавлено в закладки');
    }

    function removeBookmark(url) {
        bookmarks = bookmarks.filter(b => b.url !== url);
        saveBookmarks();
        updateBookmarksList();
        showToast('🗑️ Удалено из закладок');
    }

    function updateBookmarksList() {
        const list = document.getElementById('bookmarksList');
        if (!list) return;
        if (bookmarks.length === 0) {
            list.innerHTML = '<div style="padding: 20px; text-align: center; color: var(--text-secondary);">📭 Нет закладок</div>';
            return;
        }
        list.innerHTML = bookmarks.map(b => `
            <div class="bookmark-item">
                <div class="bookmark-icon">🔖</div>
                <div class="bookmark-info" onclick="navigateTo('${b.url.replace(/'/g, "\\'")}')">
                    <div class="bookmark-title">${escapeHtml(b.title)}</div>
                    <div class="bookmark-url">${escapeHtml(b.url)}</div>
                </div>
                <button class="bookmark-delete" onclick="removeBookmark('${b.url.replace(/'/g, "\\'")}')">✕</button>
            </div>
        `).join('');
    }

    function showToast(message) {
        let toast = document.getElementById('centernetToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'centernetToast';
            toast.style.cssText = `position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 24px; border-radius: 40px; font-size: 14px; z-index: 10000; opacity: 0; transition: opacity 0.2s; pointer-events: none;`;
            document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m] || m);
    }

    // ===== НАВИГАЦИЯ =====
    function navigateTo(query) {
        if (!query.trim()) return;
        const lower = query.toLowerCase();
        const sarSites = ['sinopt', 'fbi', 'gensec', 'bmz', 'centernet'];
        
        if (sarSites.includes(lower)) {
            openSarSite(lower);
        } else if (lower.includes('.') || lower.includes('http') || lower.includes('www')) {
            let url = lower;
            if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
            const tab = tabs.find(t => t.id === activeTab);
            if (tab) { tab.url = url; tab.type = 'iframe'; }
            renderIframePage(activeTab, url);
            document.getElementById('urlInput').value = url;
            saveToHistory(url);
        } else {
            const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
            const tab = tabs.find(t => t.id === activeTab);
            if (tab) { tab.url = searchUrl; tab.type = 'iframe'; }
            renderIframePage(activeTab, searchUrl);
            document.getElementById('urlInput').value = searchUrl;
            saveToHistory(searchUrl);
        }
        saveTabs();
    }

    function renderIframePage(tabId, url) {
        const pageDiv = document.querySelector(`.page[data-page="${tabId}"]`);
        if (pageDiv) pageDiv.innerHTML = `<iframe class="iframe-page" src="${url}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>`;
    }

    function renderPage(tabId, url) {
        const pageDiv = document.querySelector(`.page[data-page="${tabId}"]`);
        if (!pageDiv) return;
        let content = '';
        if (url === 'centernet' || url === '') content = getHomePage();
        else if (url === 'sinopt') content = getSinoptPage();
        else if (url === 'fbi') content = getFBIPage();
        else if (url === 'gensec') content = getGENSECPage();
        else if (url === 'bmz') content = getBMZPage();
        else content = `<div style="text-align:center; padding:50px;"><h2>❌ Сайт не найден</h2></div>`;
        pageDiv.innerHTML = `<div class="sar-page">${content}</div>`;
        if (url === 'centernet') setTimeout(() => {
            const searchInput = document.getElementById('homeSearch');
            if (searchInput) searchInput.onkeypress = (e) => { if (e.key === 'Enter') searchFromHome(); };
        }, 50);
    }

    function openSarSite(site) {
        const tab = tabs.find(t => t.id === activeTab);
        if (tab) { tab.url = site; tab.type = 'sar'; }
        renderPage(activeTab, site);
        document.getElementById('urlInput').value = site;
        saveToHistory(site);
        saveTabs();
    }

    // ===== ВКЛАДКИ =====
    function createNewTab() {
        const newId = nextTabId++;
        tabs.push({ id: newId, url: 'centernet', title: 'Centernet', type: 'sar' });
        const tabBar = document.getElementById('tabBar');
        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab';
        tabDiv.setAttribute('data-tab', newId);
        tabDiv.innerHTML = `<span>🏠</span><span>Centernet</span><button class="tab-close">✕</button>`;
        tabDiv.onclick = (e) => {
            if (e.target.classList.contains('tab-close')) { closeTab(newId); e.stopPropagation(); return; }
            switchTab(newId);
        };
        tabBar.appendChild(tabDiv);
        const pagesContainer = document.getElementById('pagesContainer');
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        pageDiv.setAttribute('data-page', newId);
        pageDiv.innerHTML = `<div class="sar-page">${getHomePage()}</div>`;
        pagesContainer.appendChild(pageDiv);
        switchTab(newId);
        saveTabs();
    }

    function closeTab(tabId) {
        if (tabs.length === 1) return;
        const index = tabs.findIndex(t => t.id === tabId);
        if (index === -1) return;
        tabs.splice(index, 1);
        const tabDiv = document.querySelector(`.tab[data-tab="${tabId}"]`);
        if (tabDiv) tabDiv.remove();
        const pageDiv = document.querySelector(`.page[data-page="${tabId}"]`);
        if (pageDiv) pageDiv.remove();
        if (activeTab === tabId) {
            const newActive = tabs[0]?.id;
            if (newActive) switchTab(newActive);
        }
        saveTabs();
    }

    function switchTab(tabId) {
        activeTab = tabId;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabId}"]`).classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelector(`.page[data-page="${tabId}"]`).classList.add('active');
        const tab = tabs.find(t => t.id === tabId);
        if (tab) document.getElementById('urlInput').value = tab.url;
    }

    function saveTabs() {
        if (!currentUser) return;
        const tabsToSave = tabs.map(t => ({ id: t.id, url: t.url, title: t.title, type: t.type }));
        localStorage.setItem(`centernet_tabs_${currentUser}`, JSON.stringify(tabsToSave));
        localStorage.setItem(`centernet_activeTab_${currentUser}`, activeTab);
    }

    function loadTabs() {
        if (!currentUser) return;
        const savedTabs = localStorage.getItem(`centernet_tabs_${currentUser}`);
        const savedActive = localStorage.getItem(`centernet_activeTab_${currentUser}`);
        if (savedTabs) {
            const parsed = JSON.parse(savedTabs);
            if (parsed.length > 0) {
                while (tabs.length > 0) closeTab(tabs[0].id);
                parsed.forEach(tab => {
                    const newId = nextTabId++;
                    tabs.push({ id: newId, url: tab.url, title: tab.title, type: tab.type });
                    const tabBar = document.getElementById('tabBar');
                    const tabDiv = document.createElement('div');
                    tabDiv.className = 'tab';
                    tabDiv.setAttribute('data-tab', newId);
                    tabDiv.innerHTML = `<span>${tab.url === 'centernet' ? '🏠' : '🌐'}</span><span>${tab.title}</span><button class="tab-close">✕</button>`;
                    tabDiv.onclick = (e) => {
                        if (e.target.classList.contains('tab-close')) { closeTab(newId); e.stopPropagation(); return; }
                        switchTab(newId);
                    };
                    tabBar.appendChild(tabDiv);
                    const pagesContainer = document.getElementById('pagesContainer');
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.setAttribute('data-page', newId);
                    pageDiv.innerHTML = tab.type === 'iframe' ? `<iframe class="iframe-page" src="${tab.url}"></iframe>` : `<div class="sar-page">${getSarPageContent(tab.url)}</div>`;
                    pagesContainer.appendChild(pageDiv);
                });
                if (savedActive && tabs.some(t => t.id == savedActive)) switchTab(parseInt(savedActive));
                else if (tabs.length > 0) switchTab(tabs[0].id);
            }
        }
    }

    // ===== АККАУНТЫ =====
    function register(email, password) {
        if (allUsers[email]) return false;
        const username = email.split('@')[0];
        allUsers[email] = { username, email, password, avatar: '👤', bookmarks: [] };
        localStorage.setItem('centernet_users', JSON.stringify(allUsers));
        return true;
    }

    function login(email, password) {
        if (allUsers[email] && allUsers[email].password === password) {
            currentUser = email;
            localStorage.setItem('centernet_current', currentUser);
            return true;
        }
        return false;
    }

    function initApp() {
        document.getElementById('userEmail').innerText = currentUser;
        document.getElementById('userAvatar').innerHTML = allUsers[currentUser]?.avatar || '👤';
        loadBookmarks();
        loadTabs();
        updateBookmarksList();
    }

    // ===== СОБЫТИЯ =====
    document.getElementById('authBtn').onclick = () => {
        const login = document.getElementById('authLogin').value.trim();
        const tag = document.getElementById('authTag').value.trim();
        const password = document.getElementById('authPassword').value;
        const email = login + tag;
        const isLogin = document.getElementById('authTitle').innerText === 'Вход в Centernet';
        if (isLogin) {
            if (login(email, password)) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('browser').style.display = 'flex';
                initApp();
            } else alert('Неверные данные');
        } else {
            if (register(email, password)) {
                alert('Регистрация успешна! Войдите.');
                document.getElementById('authTitle').innerText = 'Вход в Centernet';
                document.getElementById('authBtn').innerText = 'Войти';
                document.getElementById('authSwitch').innerHTML = 'Нет аккаунта? Зарегистрироваться';
            } else alert('Пользователь уже существует');
        }
    };

    document.getElementById('authSwitch').onclick = () => {
        const isLogin = document.getElementById('authTitle').innerText === 'Вход в Centernet';
        if (isLogin) {
            document.getElementById('authTitle').innerText = 'Регистрация';
            document.getElementById('authBtn').innerText = 'Зарегистрироваться';
            document.getElementById('authSwitch').innerHTML = 'Уже есть аккаунт? Войти';
        } else {
            document.getElementById('authTitle').innerText = 'Вход в Centernet';
            document.getElementById('authBtn').innerText = 'Войти';
            document.getElementById('authSwitch').innerHTML = 'Нет аккаунта? Зарегистрироваться';
        }
    };

    document.getElementById('newTabBtn').onclick = () => createNewTab();
    document.getElementById('goBtn').onclick = () => { const url = document.getElementById('urlInput').value.trim(); if (url) navigateTo(url); };
    document.getElementById('urlInput').addEventListener('focus', showHistorySuggestions);
    document.getElementById('urlInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('goBtn').click(); });
    document.getElementById('bookmarkBtn').onclick = () => addBookmark();
    document.getElementById('bookmarksListBtn').onclick = () => {
        const panel = document.getElementById('bookmarksPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        updateBookmarksList();
    };
    document.getElementById('closeBookmarksPanel').onclick = () => document.getElementById('bookmarksPanel').style.display = 'none';

    window.navigateTo = navigateTo;
    window.openSarSite = openSarSite;
    window.searchFromHome = () => {
        const input = document.getElementById('homeSearch');
        if (input && input.value) navigateTo(input.value);
    };
    window.removeBookmark = removeBookmark;

    const saved = localStorage.getItem('centernet_current');
    if (saved && allUsers[saved]) {
        currentUser = saved;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('browser').style.display = 'flex';
        initApp();
    }
</script>
</body>
</html>
