                        document.getElementById('weatherTemp').innerHTML = d.current_weather.temperature + '°C';
                        document.getElementById('weatherDesc').innerHTML = '💨 Ветер: ' + d.current_weather.windspeed + ' м/с';

                    <p style="color: var(--text-primary);">🔹 26.03.2026 — Драго всё ещё должен 100 рублей</p>

    function getGENSECPage() {

            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--text-primary); margin-bottom: 24px;">🛡️ GENSEC.sar</h1>
                <div style="background: var(--bg-secondary); border-radius: 24px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);">

                    <p style="color: var(--text-primary); margin-bottom: 8px;">Основатель: <strong>Майк Малас</strong></p>

                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;">

                        <div style="font-size: 28px; margin-bottom: 8px;">🛡️</div>

    function getBMZPage() {
        return `
            <div style="max-width: 700px; margin: 0 auto;">
                <h1 style="color: var(--text-primary); margin-bottom: 24px;">⚡ BMZ.sar</h1>
                <div style="background: var(--bg-secondary); border-radius: 24px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border);">
                    <h3 style="color: var(--accent); margin-bottom: 16px;">Blackmurk Zealwater</h3>
                    <p style="color: var(--text-primary); margin-bottom: 8px;">Элитное подразделение специального назначения</p>
                    <p style="color: var(--text-primary);">Антитеррор • Контрштурм • Защита VIP</p>
                </div>

                    <span style="background: var(--bg-secondary); padding: 8px 20px; border-radius: 40px; border: 1px solid var(--border);">🫎 Бульдозеры</span>

    // ===== ОБНОВЛЁННАЯ ФУНКЦИЯ РЕНДЕРА =====
    function renderPage(tabId, url) {
        const pageDiv = document.querySelector(`.page[data-page="${tabId}"]`);
        if (!pageDiv) return;
        
        let content = '';
        if (url === 'centernet' || url === '') {
            content = getHomePage();
        } else if (url === 'sinopt' || url === 'sinopt.sar') {
            content = getSinoptPage();
        } else if (url === 'fbi' || url === 'fbi.sar') {
            content = getFBIPage();
        } else if (url === 'gensec' || url === 'gensec.sar') {
            content = getGENSECPage();
        } else if (url === 'bmz' || url === 'bmz.sar') {
            content = getBMZPage();
        } else {
            content = `<div style="text-align:center; padding:50px;"><h2>❌ Сайт не найден</h2><p>.sar сайт ${url} не зарегистрирован</p></div>`;
        }
        
        pageDiv.innerHTML = `<div class="sar-page">${content}</div>`;
        
        // Привязываем поиск после рендера домашней страницы
        if (url === 'centernet') {
            setTimeout(() => {
                const searchInput = document.getElementById('homeSearch');
                if (searchInput) {
                    searchInput.onkeypress = (e) => { if (e.key === 'Enter') searchFromHome(); };
                }
            }, 50);
        }
    }

    // ===== ОБНОВЛЁННАЯ ФУНКЦИЯ ПОИСКА =====
    window.searchFromHome = function() {
        const input = document.getElementById('homeSearch');
        if (!input) return;
        const query = input.value.trim().toLowerCase();
        if (query === '') return;
        
        const sarSites = ['sinopt', 'fbi', 'gensec', 'bmz', 'centernet'];
        if (sarSites.includes(query)) {
            openSarSite(query);
        } else {
            alert('Поиск в Google будет доступен в следующей версии. Пока можно открыть .sar сайты: sinopt, fbi, gensec, bmz');
        }
    };

    // ===== ОБНОВЛЁННЫЙ GO БАР =====
    const oldGoHandler = document.getElementById('goBtn').onclick;
    document.getElementById('goBtn').onclick = () => {
        const url = document.getElementById('urlInput').value.trim().toLowerCase();
        if (url === '') return;
        
        const sarSites = ['sinopt', 'fbi', 'gensec', 'bmz', 'centernet'];
        if (sarSites.includes(url)) {
            openSarSite(url);
        } else if (url.includes('.sar')) {
            const site = url.replace('.sar', '');
            if (sarSites.includes(site)) openSarSite(site);
            else alert(`.sar сайт ${site} не найден`);
        } else {
            alert('Поиск в Google будет доступен в следующей версии. Пока можно открыть .sar сайты: sinopt, fbi, gensec, bmz');
        }
    };
      </script>
