<script>
    // ===== ПОИСК В GOOGLE =====
    function searchGoogle(query) {
        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(query)}`;
        const tab = tabs.find(t => t.id === activeTab);
        if (tab) {
            tab.url = searchUrl;
            tab.type = 'iframe';
        }
        renderIframePage(activeTab, searchUrl);
        document.getElementById('urlInput').value = searchUrl;
    }

    // ===== ОТКРЫТИЕ ВНЕШНИХ САЙТОВ =====
    function renderIframePage(tabId, url) {
        const pageDiv = document.querySelector(`.page[data-page="${tabId}"]`);
        if (!pageDiv) return;
        
        // Добавляем https:// если нет протокола
        let fullUrl = url;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            fullUrl = 'https://' + url;
        }
        
        pageDiv.innerHTML = `<iframe class="iframe-page" src="${fullUrl}" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>`;
        
        // Сохраняем в историю
        saveToHistory(fullUrl);
    }

    // ===== ИСТОРИЯ =====
    let history = JSON.parse(localStorage.getItem(`centernet_history_${currentUser}`)) || [];
    
    function saveToHistory(url) {
        if (!currentUser) return;
        const historyKey = `centernet_history_${currentUser}`;
        let history = JSON.parse(localStorage.getItem(historyKey)) || [];
        
        // Добавляем в начало, убираем дубликаты
        history = [url, ...history.filter(u => u !== url)].slice(0, 50);
        localStorage.setItem(historyKey, JSON.stringify(history));
    }
    
    function getHistory() {
        if (!currentUser) return [];
        return JSON.parse(localStorage.getItem(`centernet_history_${currentUser}`)) || [];
    }

    // ===== ВЫПАДАЮЩЕЕ МЕНЮ ИСТОРИИ =====
    function showHistorySuggestions(input) {
        const historyList = getHistory();
        if (historyList.length === 0) return;
        
        // Удаляем старое меню, если есть
        const oldMenu = document.getElementById('historySuggestions');
        if (oldMenu) oldMenu.remove();
        
        const menu = document.createElement('div');
        menu.id = 'historySuggestions';
        menu.style.cssText = `
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-top: 4px;
            z-index: 1000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-height: 300px;
            overflow-y: auto;
        `;
        
        historyList.slice(0, 8).forEach(url => {
            const item = document.createElement('div');
            item.style.cssText = `
                padding: 12px 16px;
                cursor: pointer;
                color: var(--text-primary);
                font-size: 13px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 12px;
            `;
            item.innerHTML = `<span style="color: var(--accent);">🕒</span><span style="flex:1; overflow:hidden; text-overflow:ellipsis;">${url}</span>`;
            item.onclick = () => {
                navigateTo(url);
                menu.remove();
            };
            menu.appendChild(item);
        });
        
        const container = document.querySelector('.url-bar');
        container.style.position = 'relative';
        container.appendChild(menu);
        
        // Закрыть при клике вне
        setTimeout(() => {
            document.addEventListener('click', function closeMenu(e) {
                if (!menu.contains(e.target) && !input.contains(e.target)) {
                    menu.remove();
                    document.removeEventListener('click', closeMenu);
                }
            });
        }, 100);
    }

    // ===== НАВИГАЦИЯ =====
    function navigateTo(query) {
        if (!query.trim()) return;
        
        const lower = query.toLowerCase();
        const sarSites = ['sinopt', 'fbi', 'gensec', 'bmz', 'centernet'];
        
        // Проверка на .sar сайты
        if (sarSites.includes(lower)) {
            openSarSite(lower);
        }
        // Проверка на URL (содержит точку или http)
        else if (lower.includes('.') || lower.includes('http') || lower.includes('www')) {
            let url = lower;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            const tab = tabs.find(t => t.id === activeTab);
            if (tab) {
                tab.url = url;
                tab.type = 'iframe';
            }
            renderIframePage(activeTab, url);
            document.getElementById('urlInput').value = url;
        }
        // Иначе поиск в Google
        else {
            searchGoogle(query);
        }
    }

    // ===== ОБНОВЛЁННЫЙ ОБРАБОТЧИК URL БАРА =====
    const urlInput = document.getElementById('urlInput');
    
    urlInput.addEventListener('focus', () => {
        showHistorySuggestions(urlInput);
    });
    
    urlInput.addEventListener('input', () => {
        // Если вводим что-то новое — убираем подсказки
        const menu = document.getElementById('historySuggestions');
        if (menu) menu.remove();
    });
    
    // ===== ОБНОВЛЁННАЯ ФУНКЦИЯ СОЗДАНИЯ ВКЛАДКИ =====
    const originalCreateTab = createNewTab;
    window.createNewTab = function() {
        originalCreateTab();
        // После создания вкладки обновляем ссылку на активную
        setTimeout(() => {
            const urlInput = document.getElementById('urlInput');
            if (urlInput) urlInput.value = '';
        }, 10);
    };
    
    // ===== ОБНОВЛЁННЫЙ GO БАР =====
    document.getElementById('goBtn').onclick = () => {
        const url = document.getElementById('urlInput').value.trim();
        if (url === '') return;
        navigateTo(url);
    };
    
    urlInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('goBtn').click();
        }
    });
    
    // ===== ОБНОВЛЁННАЯ ФУНКЦИЯ OPEN SITE =====
    window.openSarSite = function(site) {
        const tab = tabs.find(t => t.id === activeTab);
        if (tab) {
            tab.url = site;
            tab.type = 'sar';
        }
        renderPage(activeTab, site);
        document.getElementById('urlInput').value = site;
        saveToHistory(site);
    };
    
    // ===== ОБНОВЛЁННЫЙ ПОИСК С ДОМАШНЕЙ СТРАНИЦЫ =====
    window.searchFromHome = function() {
        const input = document.getElementById('homeSearch');
        if (!input) return;
        const query = input.value.trim();
        if (query === '') return;
        navigateTo(query);
    };
    
    // ===== ИНИЦИАЛИЗАЦИЯ =====
    // Сохраняем оригинальный рендер для вкладок
    const originalRenderPage = renderPage;
    window.renderPage = originalRenderPage;
    
    // Переопределяем создание вкладки, чтобы корректно работало с историей
    window.createNewTab = function() {
        const newId = nextTabId++;
        tabs.push({ id: newId, url: 'centernet', title: 'Centernet', type: 'sar' });
        
        const tabBar = document.getElementById('tabBar');
        const tabDiv = document.createElement('div');
        tabDiv.className = 'tab';
        tabDiv.setAttribute('data-tab', newId);
        tabDiv.innerHTML = `<span>🏠</span><span>Centernet</span><button class="tab-close">✕</button>`;
        tabDiv.onclick = (e) => {
            if (e.target.classList.contains('tab-close')) {
                closeTab(newId);
                e.stopPropagation();
                return;
            }
            switchTab(newId);
        };
        tabBar.appendChild(tabDiv);
        
        const pagesContainer = document.getElementById('pagesContainer');
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        pageDiv.setAttribute('data-page', newId);
        pageDiv.innerHTML = `<div class="sar-page">${getHomePage()}</div>`;
        pagesContainer.appendChild(pageDiv);
        
        switchTab(newId);
    };
</script>
